<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Dairy Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="android-container">
    <div class="result-dashboard">
        <div class="output-box">
            <span class="label">TOTAL MILK</span>
            <div class="display-value"><span id="totalLiters">0.0</span> <small>Ltr</small></div>
        </div>
        <div class="output-box">
            <span class="label">TOTAL PRICE</span>
            <div class="display-value price">₹<span id="totalPrice">0</span></div>
        </div>
    </div>

    <main class="content">
        <div class="settings-card">
            <label>Milk Rate (per Liter):</label>
            <div class="rate-input-wrapper">
                <span>₹</span>
                <input type="number" id="basePrice" value="60" placeholder="60">
            </div>
        </div>

        <div class="card">
            <div class="input-header">
                <span>Bottle Size</span>
                <span>Enter Quantity</span>
            </div>
            
            <div class="milk-row">
                <label>1.0 L</label>
                <input type="number" class="qty-input" data-size="1.0" placeholder="0">
            </div>
            <div class="milk-row">
                <label>1.5 L</label>
                <input type="number" class="qty-input" data-size="1.5" placeholder="0">
            </div>
            <div class="milk-row">
                <label>2.0 L</label>
                <input type="number" class="qty-input" data-size="2.0" placeholder="0">
            </div>
            <div class="milk-row">
                <label>2.5 L</label>
                <input type="number" class="qty-input" data-size="2.5" placeholder="0">
            </div>
            <div class="milk-row">
                <label>3.0 L</label>
                <input type="number" class="qty-input" data-size="3.0" placeholder="0">
            </div>
            <div class="milk-row">
                <label>3.5 L</label>
                <input type="number" class="qty-input" data-size="3.5" placeholder="0">
            </div>
        </div>

        <div id="receipt-card" class="card" style="margin-top: 16px; display: none; border: 2px dashed var(--primary);">
            <h3 style="text-align: center; color: var(--primary); margin-top: 0;">Milk Receipt</h3>
            <div id="receipt-list"></div>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
                <span>Total:</span>
                <span id="receipt-grand-total">₹0</span>
            </div>
        </div>

        <button class="generate-btn" onclick="generateReceipt()">GENERATE RECEIPT</button>
        <button class="clear-btn" onclick="clearAll()">RESET ALL</button>
    </main>
</div>

<script src="script.js"></script> </body>
</html>
