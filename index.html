<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Kender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Milk Kender</h1>
            <div class="date-selector">
                <label>Selected Date:</label>
                <input type="date" id="entry-date">
            </div>
        </header>

        <section class="price-config">
            <label>Price per Liter ($):</label>
            <input type="number" id="milk-price" placeholder="Set Price" step="0.01">
        </section>

        <section class="entry-buttons">
            <div class="input-row">
                <div class="card">
                    <h3>Morning (L)</h3>
                    <input type="number" id="morning-input" placeholder="0.0" step="0.1">
                </div>
                <div class="card">
                    <h3>Evening (L)</h3>
                    <input type="number" id="evening-input" placeholder="0.0" step="0.1">
                </div>
            </div>
            <button id="save-btn" onclick="saveEntry()">Save / Update Entry</button>
        </section>

        <section class="report-area">
            <h3>Weekly Summary</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Morn</th>
                            <th>Eve</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="report-body"></tbody>
                </table>
            </div>
            <div class="total-bar">
                <p>Weekly Total: <span id="weekly-liters">0</span> L</p>
                <p>Total Bill: $<span id="weekly-cost">0</span></p>
            </div>
            <button class="reset-btn" onclick="resetCycle()">Clear Week & Start Fresh</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
